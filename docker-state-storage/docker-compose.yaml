services:
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/www:/var/www
      - ./caddy/data:/data
    environment:
      DOMAIN: "cosmotechstates.onpremise.platform.cosmotech.com"
      CADDYFILE_CONTENT: |
        :80 {

          basic_auth {
              admin $COSMOTECHSTATES_PASSWORD_HASH
          }

          # Weddav access
          route {
              webdav {
                  root /var/www/cosmotechstates
                  prefix /cosmotechstates
              }
          }

          # Web browser view
          handle {
              root * /var/www/
              file_server browse
          }
        }
    command: >
      sh -c "
            echo \"$$CADDYFILE_CONTENT\" > /etc/caddy/Caddyfile &&
            caddy add-package github.com/mholt/caddy-webdav || true &&
            caddy run --config /etc/caddy/Caddyfile
            "